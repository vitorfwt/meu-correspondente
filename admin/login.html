<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Administrativo - Meu Correspondente</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brandPrimary: '#0D1B2A',     // Dark Navy
            brandSecondary: '#1B4965',   // Medium Blue
            brandAccent: '#2EC4B6',      // Turquoise
            brandIceBlue: '#E0E7EF',     // Light Grey (Ice Blue)
            brandBg: '#F7F9FC',          // Background
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <!-- Auth.js - Executa imediatamente para checar se já está logado -->
  <script src="js/auth.js"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-brandPrimary via-[#12243a] to-brandSecondary text-slate-100 min-h-screen flex items-center justify-center p-4 selection:bg-brandAccent selection:text-brandPrimary">

  <!-- Background decorative glows -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-brandAccent/10 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-brandSecondary/20 rounded-full blur-3xl pointer-events-none"></div>

  <!-- Login Card -->
  <div class="relative w-full max-w-md bg-brandPrimary/60 backdrop-blur-xl border border-brandSecondary/40 rounded-2xl p-8 shadow-2xl transition-all duration-300 hover:border-brandAccent/30">
    <!-- Header/Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-tr from-brandSecondary to-brandAccent rounded-2xl flex items-center justify-center shadow-lg shadow-brandAccent/20 mb-4 animate-pulse">
        <!-- Brand Icon SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" class="h-9 w-9 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-brandAccent">
        Meu Correspondente
      </h1>
      <p class="text-brandIceBlue/70 text-sm mt-1">Painel Administrativo</p>
    </div>

    <!-- Error Alert (hidden by default) -->
    <div id="errorAlert" class="hidden mb-6 p-4 bg-red-950/40 border border-red-800/80 text-red-200 text-sm rounded-xl flex items-start space-x-2 transition-all duration-300">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-400 shrink-0 mt-0.5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
      </svg>
      <span id="errorMessage">E-mail ou senha incorretos.</span>
    </div>

    <!-- Form -->
    <form id="loginForm" class="space-y-6" novalidate>
      <div>
        <label for="email" class="block text-sm font-medium text-brandIceBlue/95 mb-2">E-mail</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          required
          class="w-full bg-brandPrimary/40 border border-brandSecondary/60 rounded-xl px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brandAccent/80 focus:border-transparent transition-all duration-200"
          placeholder="admin@meucorrespondente.com"
        >
        <span id="emailError" class="text-xs text-red-400 mt-1 hidden">Por favor, insira um e-mail válido.</span>
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-brandIceBlue/95 mb-2">Senha</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          required
          class="w-full bg-brandPrimary/40 border border-brandSecondary/60 rounded-xl px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brandAccent/80 focus:border-transparent transition-all duration-200"
          placeholder="••••••••"
        >
        <span id="passwordError" class="text-xs text-red-400 mt-1 hidden">A senha é obrigatória.</span>
      </div>

      <button 
        type="submit" 
        id="submitBtn"
        class="w-full bg-gradient-to-r from-brandSecondary to-brandAccent hover:from-[#163e56] hover:to-[#26a89c] text-white font-medium rounded-xl py-3 shadow-lg shadow-brandAccent/10 hover:shadow-brandAccent/20 transition-all duration-200 focus:ring-2 focus:ring-brandAccent focus:ring-offset-2 focus:ring-offset-brandPrimary flex items-center justify-center space-x-2"
      >
        <span id="btnText">Acessar Painel</span>
        <!-- Spinner Loading (hidden by default) -->
        <svg id="btnSpinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </button>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');
    
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');

    // Validação em tempo real
    emailInput.addEventListener('input', () => {
      emailError.classList.add('hidden');
      errorAlert.classList.add('hidden');
    });
    passwordInput.addEventListener('input', () => {
      passwordError.classList.add('hidden');
      errorAlert.classList.add('hidden');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      let hasError = false;

      // Validar email simples
      if (!emailInput.value || !emailInput.value.includes('@')) {
        emailError.classList.remove('hidden');
        hasError = true;
      }

      // Validar senha
      if (!passwordInput.value) {
        passwordError.classList.remove('hidden');
        hasError = true;
      }

      if (hasError) return;

      // Iniciar loading
      submitBtn.disabled = true;
      btnText.textContent = 'Autenticando...';
      btnSpinner.classList.remove('hidden');
      errorAlert.classList.add('hidden');

      try {
        const response = await fetch('/api/auth/admin-login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: emailInput.value.trim(),
            password: passwordInput.value
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Erro na autenticação.');
        }

        // Salvar sessão e redirecionar
        setSession(data.token, data.user);
        window.location.href = 'index.html';

      } catch (error) {
        errorMessage.textContent = error.message;
        errorAlert.classList.remove('hidden');
        
        // Parar loading
        submitBtn.disabled = false;
        btnText.textContent = 'Acessar Painel';
        btnSpinner.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
